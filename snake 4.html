<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: 'Press Start 2P', monospace;
    color: #33ff33;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    -webkit-touch-callout: none;
  }

  .scanlines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: min(92vw, 460px);
    padding: 12px 4px;
  }

  #header span {
    font-size: 11px;
    letter-spacing: 1px;
  }

  #score { color: #ffcc00; }

  canvas {
    border: 3px solid #33ff33;
    border-radius: 4px;
    box-shadow:
      0 0 20px rgba(51, 255, 51, 0.15),
      inset 0 0 40px rgba(51, 255, 51, 0.03);
    background: #0d1a0d;
  }

  #tap-info {
    margin-top: 16px;
    font-size: 9px;
    color: #33ff3388;
    text-align: center;
    line-height: 2;
    letter-spacing: 0.5px;
  }

  #direction-indicator {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    color: #33ff3355;
    z-index: 50;
    transition: color 0.1s, text-shadow 0.1s;
  }

  #direction-indicator.flash {
    color: #33ff33;
    text-shadow: 0 0 10px #33ff33aa;
  }

  /* Visual tap zone feedback */
  #tap-flash {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 50%;
    pointer-events: none;
    z-index: 80;
    opacity: 0;
    transition: opacity 0.08s;
  }

  #tap-flash.left {
    left: 0;
    background: linear-gradient(to right, rgba(51,255,51,0.06), transparent);
  }

  #tap-flash.right {
    right: 0;
    left: auto;
    background: linear-gradient(to left, rgba(51,255,51,0.06), transparent);
  }

  #tap-flash.show {
    opacity: 1;
  }

  /* Center divider line (subtle) */
  #divider {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(51,255,51,0.06);
    z-index: 79;
    pointer-events: none;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 90;
    gap: 20px;
    text-align: center;
    padding: 20px;
  }

  #overlay.hidden { display: none; }

  #overlay h1 {
    font-size: 22px;
    color: #33ff33;
    text-shadow: 0 0 20px #33ff33aa;
  }

  #overlay .sub {
    font-size: 10px;
    color: #33ff3399;
    line-height: 2.2;
  }

  #overlay .final-score {
    font-size: 16px;
    color: #ffcc00;
    margin: 8px 0;
  }
</style>
</head>
<body>

<div class="scanlines"></div>
<div id="divider"></div>
<div id="tap-flash" class="left"></div>

<div id="overlay">
  <h1>SNAKE</h1>
  <div class="sub">
    Links tippen = Links drehen<br>
    Rechts tippen = Rechts drehen
  </div>
  <div class="sub" style="margin-top:12px; color:#33ff33">
    Tippe zum Starten
  </div>
</div>

<div id="header">
  <span>SNAKE</span>
  <span id="score">SCORE: 0</span>
</div>

<canvas id="game"></canvas>

<div id="tap-info">Links = Linksdrehung | Rechts = Rechtsdrehung</div>
<div id="direction-indicator"></div>

<script>
(function() {
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var overlay = document.getElementById("overlay");
  var scoreEl = document.getElementById("score");
  var dirIndicator = document.getElementById("direction-indicator");
  var tapFlash = document.getElementById("tap-flash");

  var GRID = 20;
  var COLS = GRID;
  var ROWS = GRID;
  var CELL = 20;
  var SPEED = 150;

  // 0=up, 1=right, 2=down, 3=left
  var DIRS = [
    { x: 0, y: -1 },
    { x: 1, y: 0 },
    { x: 0, y: 1 },
    { x: -1, y: 0 }
  ];
  var DIR_ARROWS = ["\u2191", "\u2192", "\u2193", "\u2190"];

  var snake = [];
  var dir = 1;
  var nextDir = 1;
  var food = { x: 5, y: 5 };
  var score = 0;
  var gameOver = false;
  var running = false;
  var flashTimer = null;

  function resize() {
    var maxW = Math.min(window.innerWidth * 0.92, 460);
    var maxH = window.innerHeight * 0.55;
    CELL = Math.floor(Math.min(maxW, maxH) / GRID);
    if (CELL < 10) CELL = 10;
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;
  }

  function init() {
    var mid = Math.floor(GRID / 2);
    snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid }
    ];
    dir = 1;
    nextDir = 1;
    score = 0;
    gameOver = false;
    running = true;
    scoreEl.textContent = "SCORE: 0";
    placeFood();
    updateDirIndicator();
  }

  function placeFood() {
    var pos;
    var attempts = 0;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
      attempts++;
    } while (isOnSnake(pos.x, pos.y) && attempts < 500);
    food = pos;
  }

  function isOnSnake(x, y) {
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === x && snake[i].y === y) return true;
    }
    return false;
  }

  function turnRight() {
    nextDir = (nextDir + 1) % 4;
    updateDirIndicator();
  }

  function turnLeft() {
    nextDir = (nextDir + 3) % 4; // +3 is same as -1 mod 4
    updateDirIndicator();
  }

  function showFlash(side) {
    tapFlash.className = side;
    tapFlash.classList.add("show");
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(function() {
      tapFlash.classList.remove("show");
    }, 120);
  }

  function updateDirIndicator() {
    dirIndicator.textContent = DIR_ARROWS[nextDir];
    dirIndicator.classList.remove("flash");
    void dirIndicator.offsetWidth;
    dirIndicator.classList.add("flash");
    setTimeout(function() {
      dirIndicator.classList.remove("flash");
    }, 200);
  }

  function step() {
    if (!running || gameOver) return;

    dir = nextDir;

    var head = {
      x: snake[0].x + DIRS[dir].x,
      y: snake[0].y + DIRS[dir].y
    };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame();
      return;
    }

    if (isOnSnake(head.x, head.y)) {
      endGame();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = "SCORE: " + score;
      placeFood();
    } else {
      snake.pop();
    }
  }

  function endGame() {
    gameOver = true;
    running = false;
    overlay.innerHTML =
      '<h1>GAME OVER</h1>' +
      '<div class="final-score">SCORE: ' + score + '</div>' +
      '<div class="sub" style="color:#33ff33">Tippe zum Neustarten</div>';
    overlay.classList.remove("hidden");
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = "#1a2e1a";
    ctx.lineWidth = 0.5;
    var i;
    for (i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, ROWS * CELL);
      ctx.stroke();
    }
    for (i = 0; i <= ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(COLS * CELL, i * CELL);
      ctx.stroke();
    }

    // Food
    ctx.save();
    ctx.fillStyle = "#ff3333";
    ctx.shadowColor = "#ff3333";
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(
      food.x * CELL + CELL / 2,
      food.y * CELL + CELL / 2,
      CELL * 0.35,
      0,
      Math.PI * 2
    );
    ctx.fill();
    ctx.restore();

    // Snake
    for (i = 0; i < snake.length; i++) {
      var seg = snake[i];
      var bright = i === 0 ? 1 : Math.max(0.35, 1 - i * 0.03);
      var g = Math.round(255 * bright);
      ctx.fillStyle = "rgb(30," + g + ",30)";
      if (i === 0) {
        ctx.save();
        ctx.shadowColor = "#33ff33";
        ctx.shadowBlur = 12;
      }
      var pad = i === 0 ? 1 : 2;
      ctx.fillRect(
        seg.x * CELL + pad,
        seg.y * CELL + pad,
        CELL - pad * 2,
        CELL - pad * 2
      );
      if (i === 0) {
        ctx.restore();
      }
    }

    // Eyes
    if (snake.length > 0) {
      var h = snake[0];
      var d = DIRS[dir];
      ctx.fillStyle = "#0d1a0d";
      var cx = h.x * CELL + CELL / 2;
      var cy = h.y * CELL + CELL / 2;
      var es = CELL * 0.12;
      var eo = CELL * 0.2;
      var px = -d.y;
      var py = d.x;
      ctx.beginPath();
      ctx.arc(cx + d.x * eo + px * eo, cy + d.y * eo + py * eo, es, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + d.x * eo - px * eo, cy + d.y * eo - py * eo, es, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- Tap handling: left half = turn left, right half = turn right ---
  function getTapX(e) {
    if (e.touches && e.touches.length > 0) {
      return e.touches[0].clientX;
    }
    return e.clientX;
  }

  function onTap(e) {
    if (e) e.preventDefault();

    if (!running) {
      overlay.classList.add("hidden");
      init();
      return;
    }

    var x = getTapX(e);
    var half = window.innerWidth / 2;

    if (x < half) {
      turnLeft();
      showFlash("left");
    } else {
      turnRight();
      showFlash("right");
    }
  }

  document.addEventListener("touchstart", onTap, { passive: false });
  document.addEventListener("mousedown", onTap, false);

  // Keyboard
  document.addEventListener("keydown", function(e) {
    if (!running) {
      overlay.classList.add("hidden");
      init();
      return;
    }
    if (e.key === "ArrowLeft") turnLeft();
    if (e.key === "ArrowRight") turnRight();
  });

  function gameLoop() {
    step();
    draw();
  }

  resize();
  window.addEventListener("resize", resize);
  draw();
  setInterval(gameLoop, SPEED);
})();
</script>
</body>
</html>
